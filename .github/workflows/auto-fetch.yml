name: 每日自动抓取并部署

on:
  schedule:
    # 每天 UTC 时间 22:00 运行（北京时间早上 6:00）
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取最新数据
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          node scripts/generate_douban_catalog.mjs

      - name: 检查是否有变更
        id: git-check
        run: |
          git add json/ posters/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送变更
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git commit -m "chore: 自动更新影视数据 $(date '+%Y-%m-%d %H:%M:%S')"
          git push

      - name: 无变更通知
        if: steps.git-check.outputs.has_changes == 'false'
        run: echo "数据无变更，跳过提交"
